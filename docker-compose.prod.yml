version: '3.9'

networks:
  lady-b-network:
    driver: bridge

volumes:
  lady-b-postgres-data:
  lady-b-redis-data:
  lady-b-nginx-certs:
  lady-b-nginx-html:

services:
  lady-b-postgres:
    image: postgres:16-alpine
    container_name: lady-b-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - lady-b-postgres-data:/var/lib/postgresql/data
    networks:
      - lady-b-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  lady-b-redis:
    image: redis:7-alpine
    container_name: lady-b-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - lady-b-redis-data:/data
    networks:
      - lady-b-network
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  lady-b-be:
    image: ${DOCKER_REGISTRY}/lady-b-be:${IMAGE_TAG:-latest}
    build:
      context: ./lady-b-be
      dockerfile: Dockerfile
      target: production
    container_name: lady-b-be
    restart: always
    env_file:
      - ./lady-b-be/.env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@lady-b-postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@lady-b-redis:6379
    depends_on:
      lady-b-postgres:
        condition: service_healthy
      lady-b-redis:
        condition: service_healthy
    networks:
      - lady-b-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '5'

  lady-b-fe:
    image: ${DOCKER_REGISTRY}/lady-b-fe:${IMAGE_TAG:-latest}
    build:
      context: ./lady-b-fe
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_STRIPE_PUBLIC_KEY: ${VITE_STRIPE_PUBLIC_KEY}
        VITE_PAYPAL_CLIENT_ID: ${VITE_PAYPAL_CLIENT_ID}
        VITE_CLOUDINARY_CLOUD_NAME: ${VITE_CLOUDINARY_CLOUD_NAME}
        VITE_CLOUDINARY_UPLOAD_PRESET: ${VITE_CLOUDINARY_UPLOAD_PRESET}
    container_name: lady-b-fe
    restart: always
    depends_on:
      - lady-b-be
    networks:
      - lady-b-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  lady-b-nginx:
    image: nginx:1.25-alpine
    container_name: lady-b-nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - lady-b-nginx-certs:/etc/letsencrypt
      - lady-b-nginx-html:/var/www/certbot
    depends_on:
      - lady-b-fe
      - lady-b-be
    networks:
      - lady-b-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
