name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'lady-b-fe/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lady-b-fe/**'

defaults:
  run:
    working-directory: lady-b-fe

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lady-b-fe/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm run test
        env:
          VITE_API_URL: http://localhost:4000
          VITE_STRIPE_PUBLIC_KEY: pk_test_dummy
          VITE_PAYPAL_CLIENT_ID: dummy

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.ladybdesigns.com
          VITE_APP_NAME: Lady B Designs and Handcraft
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
          VITE_PAYPAL_CLIENT_ID: ${{ secrets.VITE_PAYPAL_CLIENT_ID }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: frontend-dist
          path: lady-b-fe/dist
          retention-days: 7
