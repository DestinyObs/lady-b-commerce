upstream lady_b_backend {
    server lady-b-be:4000;
    keepalive 64;
}

upstream lady_b_frontend {
    server lady-b-fe:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;

    # Gzip
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 5;

    # API proxy
    location /api/ {
        proxy_pass http://lady_b_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_cache_bypass $http_upgrade;

        # Stripe webhook — must not buffer
        location /api/payments/stripe/webhook {
            proxy_pass http://lady_b_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_request_buffering off;
        }
    }

    # Frontend
    location / {
        proxy_pass http://lady_b_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
