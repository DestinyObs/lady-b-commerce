version: '3.9'

networks:
  lady-b-network:
    driver: bridge

volumes:
  lady-b-postgres-data:
  lady-b-redis-data:

services:
  lady-b-postgres:
    image: postgres:16-alpine
    container_name: lady-b-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ladybcommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ladyb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ladyb_dev_password}
    ports:
      - '5433:5432'
    volumes:
      - lady-b-postgres-data:/var/lib/postgresql/data
    networks:
      - lady-b-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ladyb} -d ${POSTGRES_DB:-ladybcommerce}']
      interval: 10s
      timeout: 5s
      retries: 5

  lady-b-redis:
    image: redis:7-alpine
    container_name: lady-b-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-ladyb_redis_dev}
    ports:
      - '6379:6379'
    volumes:
      - lady-b-redis-data:/data
    networks:
      - lady-b-network
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-ladyb_redis_dev}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  lady-b-be:
    build:
      context: ./lady-b-be
      dockerfile: Dockerfile
      target: development
    container_name: lady-b-be
    restart: unless-stopped
    env_file:
      - ./lady-b-be/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-ladyb}:${POSTGRES_PASSWORD:-ladyb_dev_password}@lady-b-postgres:5432/${POSTGRES_DB:-ladybcommerce}
      REDIS_URL: redis://:${REDIS_PASSWORD:-ladyb_redis_dev}@lady-b-redis:6379
    ports:
      - '${BACKEND_PORT:-4000}:4000'
    volumes:
      - ./lady-b-be:/app
      - /app/node_modules
    depends_on:
      lady-b-postgres:
        condition: service_healthy
      lady-b-redis:
        condition: service_healthy
    networks:
      - lady-b-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  lady-b-fe:
    build:
      context: ./lady-b-fe
      dockerfile: Dockerfile
      target: development
    container_name: lady-b-fe
    restart: unless-stopped
    env_file:
      - ./lady-b-fe/.env
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-4000}
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    volumes:
      - ./lady-b-fe:/app
      - /app/node_modules
    depends_on:
      - lady-b-be
    networks:
      - lady-b-network

  lady-b-nginx:
    image: nginx:1.25-alpine
    container_name: lady-b-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - lady-b-fe
      - lady-b-be
    networks:
      - lady-b-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
