networks:
  lady-b-network:
    driver: bridge

volumes:
  lady-b-postgres-data:
  lady-b-redis-data:

services:
  # ── Database ──────────────────────────────────────────────────────────────────
  lady-b-postgres:
    image: postgres:16-alpine
    container_name: lady-b-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ladybcommerce
      POSTGRES_USER: ladyb
      POSTGRES_PASSWORD: ladyb_dev_password
    ports:
      - '5433:5432'
    volumes:
      - lady-b-postgres-data:/var/lib/postgresql/data
    networks:
      - lady-b-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ladyb -d ladybcommerce']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache ─────────────────────────────────────────────────────────────────────
  lady-b-redis:
    image: redis:7-alpine
    container_name: lady-b-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ladyb_redis_dev
    ports:
      - '6379:6379'
    volumes:
      - lady-b-redis-data:/data
    networks:
      - lady-b-network
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', 'ladyb_redis_dev', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ───────────────────────────────────────────────────────────────────
  # env_file loads ALL keys from lady-b-be/.env — replace placeholders with real
  # keys as you get them (Stripe, PayPal, Cloudinary, SMTP).
  # The environment block overrides ONLY the values that differ inside Docker
  # (container-to-container URLs use service names, not localhost).
  lady-b-be:
    build:
      context: ./lady-b-be
      dockerfile: Dockerfile
      target: development
    container_name: lady-b-be
    restart: unless-stopped
    env_file:
      - ./lady-b-be/.env
    environment:
      NODE_ENV: development
      PORT: 4000

      # ── DB / Redis: must use Docker service names, not localhost ──────────────
      DATABASE_URL: postgresql://ladyb:ladyb_dev_password@lady-b-postgres:5432/ladybcommerce
      REDIS_URL: redis://:ladyb_redis_dev@lady-b-redis:6379

      # ── CORS: allow browser at localhost AND internal FE container ─────────────
      # app.ts splits on commas → env.CORS_ORIGIN.split(',')
      CORS_ORIGIN: http://localhost:3000,http://lady-b-fe:3000

      # ── App URLs ──────────────────────────────────────────────────────────────
      APP_URL: http://localhost:3000
      API_URL: http://localhost:4000

      # ── JWT (override .env defaults with stronger dev secrets) ────────────────
      JWT_ACCESS_SECRET: ladyb_access_secret_dev_key_minimum_32_chars_here
      JWT_REFRESH_SECRET: ladyb_refresh_secret_dev_key_minimum_32_chars_here
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d

      # ── Stripe (replace with real test keys from dashboard.stripe.com) ────────
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      STRIPE_CURRENCY: usd

      # ── PayPal (replace with real sandbox keys from developer.paypal.com) ─────
      PAYPAL_CLIENT_ID: paypal_client_id_placeholder
      PAYPAL_CLIENT_SECRET: paypal_client_secret_placeholder
      PAYPAL_WEBHOOK_ID: paypal_webhook_id_placeholder
      PAYPAL_MODE: sandbox

      # ── Cloudinary (replace with real keys from cloudinary.com/console) ───────
      CLOUDINARY_CLOUD_NAME: cloudinary_cloud_name_placeholder
      CLOUDINARY_API_KEY: cloudinary_api_key_placeholder
      CLOUDINARY_API_SECRET: cloudinary_api_secret_placeholder
      CLOUDINARY_FOLDER: lady-b-commerce

      # ── SMTP email (replace with real Gmail app password) ─────────────────────
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: '587'
      SMTP_SECURE: 'false'
      SMTP_USER: your_email@gmail.com
      SMTP_PASS: your_app_password
      EMAIL_FROM: 'Lady B Designs <no-reply@ladybdesigns.com>'
      ADMIN_EMAIL: Adebiyiblessing55@gmail.com

      # ── Rate limits ───────────────────────────────────────────────────────────
      RATE_LIMIT_WINDOW_MS: '900000'
      RATE_LIMIT_MAX: '100'
      AUTH_RATE_LIMIT_MAX: '10'

      # ── Brand / upload limits ─────────────────────────────────────────────────
      DEFAULT_CURRENCY: USD
      BRAND_NAME: Lady B Designs and Handcraft
      MAX_FILE_SIZE_MB: '10'
      MAX_FILES_PER_UPLOAD: '10'
      ALLOWED_IMAGE_TYPES: image/jpeg,image/jpg,image/png,image/webp,image/avif

    ports:
      - '4000:4000'
    volumes:
      - ./lady-b-be:/app
      - /app/node_modules
    depends_on:
      lady-b-postgres:
        condition: service_healthy
      lady-b-redis:
        condition: service_healthy
    networks:
      - lady-b-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Frontend ──────────────────────────────────────────────────────────────────
  # VITE_API_URL must be reachable from the USER'S BROWSER, not the container.
  # The browser calls localhost:4000 directly (BE port is exposed on host).
  # VITE_ public keys are baked in at Vite build/dev time — replace placeholders
  # with real publishable/client-side keys as you integrate each service.
  lady-b-fe:
    build:
      context: ./lady-b-fe
      dockerfile: Dockerfile
      target: development
    container_name: lady-b-fe
    restart: unless-stopped
    environment:
      # ── API URL (browser → host → BE container) ───────────────────────────────
      VITE_API_URL: http://localhost:4000
      VITE_API_BASE_PATH: /api

      # ── Stripe public key (replace with pk_test_... from Stripe dashboard) ────
      VITE_STRIPE_PUBLIC_KEY: pk_test_placeholder

      # ── PayPal client ID (same as BE's PAYPAL_CLIENT_ID, public-safe) ─────────
      VITE_PAYPAL_CLIENT_ID: paypal_client_id_placeholder

      # ── Cloudinary (upload preset is public-safe, created in Cloudinary console)
      VITE_CLOUDINARY_CLOUD_NAME: cloudinary_cloud_name_placeholder
      VITE_CLOUDINARY_UPLOAD_PRESET: lady-b-unsigned

    ports:
      - '3000:3000'
    volumes:
      - ./lady-b-fe:/app
      - /app/node_modules
    depends_on:
      - lady-b-be
    networks:
      - lady-b-network
